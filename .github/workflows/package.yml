name: Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build zip
        run: |
          zip -r terraform-cursor-plugin.zip . \
            -x '.git/*' \
            -x '.github/*' \
            -x '*.zip' \
            -x '.DS_Store'

      - uses: actions/upload-artifact@v4
        with:
          name: terraform-cursor-plugin
          path: terraform-cursor-plugin.zip

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: terraform-cursor-plugin.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
